<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cursor Follower</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { margin: 0; height: 100vh; overflow: hidden; background-color: #1a1a1a; cursor: crosshair; }
        #moving-img {
            position: absolute; width: 200px; pointer-events: none;
            display: none; z-index: 50;
        }
    </style>
</head>
<body>

    <img id="moving-img" src="" alt="following-image">

    <script type="py">
        from pyscript import document
        from pyodide.ffi import create_proxy

        img = document.querySelector("#moving-img")

        # 表示させたい画像のID（あなたのURLから抽出したもの）
        FILE_ID = "1T9khz3huKwUyC45UvoL9dYChB7HgIfii" 

        # 読み込み時にすぐ画像を表示
        img.src = f"https://drive.google.com/thumbnail?authuser=0&sz=w1000&id={FILE_ID}"
        img.style.display = "block"

        def on_mouse_move(event):
            x = event.pageX - (img.offsetWidth / 2)
            y = event.pageY - (img.offsetHeight / 2)
            img.style.left = f"{x}px"
            img.style.top = f"{y}px"

        document.addEventListener("mousemove", create_proxy(on_mouse_move))
    </script>
</body>
</html>
